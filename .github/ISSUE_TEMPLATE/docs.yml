name: "📝 Docs"
description: "문서 작성 또는 수정 작업을 등록합니다."
title: "[Docs] 문서 제목"
labels:
  - documentation

body:
  - type: textarea
    id: background
    attributes:
      label: 📖 작업 내용
      description: 어떤 문서를 왜 작성하거나 수정하는지 작성해주세요.
      placeholder: |
        예시)
        - 프로젝트 실행 방법이 최신 버전과 달라 수정합니다.
        - API 변경 사항을 문서에 반영합니다.
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: ✏️ 수정 사항
      description: 문서에서 변경할 내용을 작성해주세요.
      placeholder: |
        예시)
        - README 실행 순서 수정
        - API 예제 추가
        - ERD 이미지 교체
    validations:
      required: true

  - type: textarea
    id: reference
    attributes:
      label: 📎 참고 자료 (선택)
      description: 관련 문서나 링크가 있다면 첨부해주세요.
      placeholder: |
        - Notion
        - Swagger
        - Figma
        - 기존 README
