name: "❓ Question"
description: "팀원들과 논의하거나 의견이 필요한 사항을 작성합니다."
title: "[Question] "
labels:
  - discussion

body:
  - type: textarea
    id: background
    attributes:
      label: 📖 배경 및 상황
      description: 질문하게 된 배경이나 현재 상황을 작성해주세요.
      placeholder: |
        예시)
        - 현재 Access Token 만료 시 재로그인이 필요합니다.
        - Refresh Token 도입 여부를 고민 중입니다.
    validations:
      required: true

  - type: textarea
    id: question
    attributes:
      label: ❓ 질문 / 논의 내용
      description: 궁금한 점이나 팀과 논의하고 싶은 내용을 작성해주세요.
      placeholder: |
        예시)
        - Refresh Token을 DB에 저장하는 것이 좋을까요?
        - Redis를 사용하는 것이 적절할까요?
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: 📂 질문 유형
      options:
        - 설계(Architecture)
        - 구현(Implementation)
        - 데이터베이스(Database)
        - 인프라(Infra)
        - UI/UX
        - 일정(Schedule)
        - 기타
    validations:
      required: true

  - type: checkboxes
    id: feedback
    attributes:
      label: 🗣 원하는 의견
      description: 필요한 의견을 모두 선택해주세요.
      options:
        - label: 설계 방향
        - label: 구현 방법
        - label: 코드 리뷰
        - label: 일정 조율
        - label: 정책 결정
        - label: 아이디어 제안
        - label: 기타

  - type: textarea
    id: reference
    attributes:
      label: 📎 참고 자료 (선택)
      description: 관련 문서, 링크, 이미지 등을 첨부해주세요.
      placeholder: |
        - GitHub Issue
        - Pull Request
        - Notion
        - API 문서
        - 화면 캡처
