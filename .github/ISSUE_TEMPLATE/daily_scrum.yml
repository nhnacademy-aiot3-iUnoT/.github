name: "🗓 Daily Scrum"
description: "팀원별 데일리 스크럼을 기록합니다."
title: "[Daily] YYYY-MM-DD (요일)"
labels:
  - scrum

body:
  - type: textarea
    id: notice
    attributes:
      label: 📢 공지 / 공유 사항 (Scrum Master)
      description: |
        스크럼 마스터가 팀 전체에 공유할 내용을 작성합니다.
        (회의 일정, 우선순위 변경, 공지사항 등)
      placeholder: |
        예시)
        - 오후 3시 중간 점검
        - API 명세 업데이트
        - 오늘 코드 리뷰 진행

        (없으면 '없음' 작성)
    validations:
      required: false

  - type: markdown
    attributes:
      value: |
        ---

        ## 👥 팀원 댓글 작성 템플릿

        아래 내용을 복사하여 **댓글(Comment)** 로 작성해주세요.

        ```markdown
        ### 이름

        #### 어제 한 일
        - 작업 내용

        #### 오늘 할 일
        - 작업 내용

        #### 🚧 이슈 / 도움이 필요한 사항 (선택)
        - 없음
        ```
