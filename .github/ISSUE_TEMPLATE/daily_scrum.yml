name: "🗓 Daily Scrum"
description: "팀원별 데일리 스크럼을 기록합니다."
title: "[Daily] 2026-MM-DD (요일)"
labels:
  - scrum

body:
  - type: textarea
    id: notice
    attributes:
      label: 📢 공지 / 공유 사항 (Scrum Master)
      description: |
        팀 전체에 공유할 내용을 작성해주세요.
        (회의 일정, 우선순위 변경, 공지사항 등)
      value: |
        ## 📌 공지사항

        - 없음

        ---

        ## 💬 팀원 댓글 작성 템플릿

        아래 내용을 **복사해서 댓글(Comment)** 로 작성해주세요.

        ```markdown
        ### 👤 이름

        #### ✅ 어제 한 일
        - 

        #### 🚀 오늘 할 일
        - 

        #### 🚧 문제 / 이슈 (선택)
        - 없음
        ```
    validations:
      required: false
