name: "🗒 Meeting"
description: "회의 내용을 기록합니다."
title: "[Meeting] YYYY-MM-DD 회의"
labels:
  - meeting

body:
  - type: input
    id: meeting_name
    attributes:
      label: 📌 회의명
      placeholder: 예) 주간 회의, Sprint Planning
    validations:
      required: true

  - type: input
    id: participants
    attributes:
      label: 👥 참석자
      placeholder: 예) 김철수, 이영희, 박민수
    validations:
      required: true

  - type: textarea
    id: agenda
    attributes:
      label: 📋 안건
      description: 이번 회의에서 논의할 내용을 작성해주세요.
      placeholder: |
        - API 설계 검토
        - 일정 점검
        - UI 수정 사항
    validations:
      required: true

  - type: textarea
    id: discussion
    attributes:
      label: 💬 논의 내용
      description: 주요 논의 내용을 작성해주세요.
      placeholder: |
        - 인증 방식을 JWT로 결정
        - API 응답 형식 통일
    validations:
      required: true

  - type: textarea
    id: decision
    attributes:
      label: ✅ 결정 사항
      description: 회의를 통해 최종 결정된 내용을 작성해주세요.
      placeholder: |
        - JWT 인증 적용
        - 응답 구조 통일
    validations:
      required: true

  - type: textarea
    id: action
    attributes:
      label: 🎯 Action Items
      description: 회의 이후 해야 할 작업을 작성해주세요.
      value: |
        - [ ] 홍길동 : 로그인 API 수정
        - [ ] 김철수 : Swagger 업데이트
        - [ ] 이영희 : README 수정
    validations:
      required: true

  - type: textarea
    id: reference
    attributes:
      label: 📎 참고 자료 (선택)
      placeholder: |
        - Notion
        - Figma
        - ERD
        - 관련 Issue
